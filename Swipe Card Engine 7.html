<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwipeFlow - Professional Card Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .tagline {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(45deg, #2196F3, #1976D2);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .deck-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .deck-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .deck-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        .deck-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .card-container {
            position: relative;
            width: 350px;
            height: 500px;
            margin: 0 auto;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: grab;
            user-select: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card:active {
            cursor: grabbing;
        }

        .card.dragging {
            transition: none;
            z-index: 1000;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .card-category {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-number {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .card-content {
            flex: 1;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
        }

        .card-footer {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .swipe-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 3rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
            pointer-events: none;
        }

        .swipe-indicator.like {
            right: 20px;
            color: #4CAF50;
        }

        .swipe-indicator.dislike {
            left: 20px;
            color: #f44336;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .dislike-btn {
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
        }

        .like-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .summary-modal .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .summary-item.liked {
            border-left-color: #4CAF50;
        }

        .summary-item.disliked {
            border-left-color: #f44336;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes modalSlideIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes cardEntry {
            from { 
                transform: translateY(50px) scale(0.9); 
                opacity: 0; 
            }
            to { 
                transform: translateY(0) scale(1); 
                opacity: 1; 
            }
        }

        .card.entering {
            animation: cardEntry 0.5s ease-out;
        }

        @media (max-width: 768px) {
            .card-container {
                width: 300px;
                height: 450px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .stats-bar {
                flex-direction: column;
                gap: 15px;
            }

            .deck-selector {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">SwipeFlow</div>
            <div class="tagline">Professional Card Engine for Modern Decision Making</div>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-number" id="totalCards">0</span>
                    <span>Total Cards</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="likedCount">0</span>
                    <span>Liked</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="dislikedCount">0</span>
                    <span>Disliked</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="accuracyRate">0%</span>
                    <span>Completion</span>
                </div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="showCreateModal()">Create New Deck</button>
            <button class="btn btn-secondary" onclick="showSummaryModal()">View Analytics</button>
            <button class="btn btn-secondary" onclick="resetDeck()">Reset Current Deck</button>
            <button class="btn btn-danger" onclick="clearAllData()">Clear All Data</button>
        </div>

        <div class="deck-selector" id="deckSelector">
            <!-- Deck buttons will be generated here -->
        </div>

        <div class="card-container" id="cardContainer">
            <!-- Cards will be generated here -->
        </div>

        <div class="action-buttons">
            <button class="action-btn dislike-btn" onclick="swipeCard('dislike')">✕</button>
            <button class="action-btn like-btn" onclick="swipeCard('like')">♥</button>
        </div>
    </div>

    <!-- Create Deck Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Deck</h2>
                <button class="close-btn" onclick="closeModal('createModal')">&times;</button>
            </div>
            <form id="createDeckForm">
                <div class="form-group">
                    <label class="form-label">Deck Name</label>
                    <input type="text" class="form-input" id="deckName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="deckCategory" required>
                        <option value="">Select Category</option>
                        <option value="startup">Startup Ideas</option>
                        <option value="affirmation">Affirmations</option>
                        <option value="flashcard">Flashcards</option>
                        <option value="decision">Decision Making</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Cards (one per line)</label>
                    <textarea class="form-textarea" id="deckCards" placeholder="Enter each card content on a new line..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Create Deck</button>
            </form>
        </div>
    </div>

    <!-- Summary Modal -->
    <div id="summaryModal" class="modal summary-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Session Analytics</h2>
                <button class="close-btn" onclick="closeModal('summaryModal')">&times;</button>
            </div>
            <div id="summaryContent">
                <!-- Summary content will be generated here -->
            </div>
        </div>
    </div>

    <script>
        class SwipeCardEngine {
            constructor() {
                this.decks = this.loadFromStorage('swipeDecks') || {};
                this.currentDeck = null;
                this.currentCards = [];
                this.currentIndex = 0;
                this.swipeHistory = [];
                this.statistics = this.loadFromStorage('swipeStats') || {
                    totalSwipes: 0,
                    totalLikes: 0,
                    totalDislikes: 0,
                    sessionData: {}
                };
                
                this.initializeDefaultDecks();
                this.bindEvents();
                this.renderDeckSelector();
                this.loadDeck('startup');
            }

            initializeDefaultDecks() {
                if (Object.keys(this.decks).length === 0) {
                    this.decks = {
                        startup: {
                            name: "Innovative Startup Ideas",
                            category: "startup",
                            cards: [
                                "AI-powered meal planning app that learns your dietary preferences and budget constraints",
                                "Virtual reality workspace for remote teams with haptic feedback collaboration",
                                "Blockchain-based carbon credit marketplace for small businesses",
                                "Smart mirror that provides health analytics and personalized fitness coaching",
                                "Peer-to-peer skill exchange platform connecting professionals globally",
                                "Augmented reality interior design app with real furniture placement",
                                "Automated urban farming systems for apartment dwellers",
                                "AI-driven mental health companion with 24/7 emotional support"
                            ]
                        },
                        affirmation: {
                            name: "Daily Empowerment",
                            category: "affirmation",
                            cards: [
                                "I am capable of achieving extraordinary things through consistent effort",
                                "Every challenge I face is an opportunity for growth and learning",
                                "I attract positive energy and meaningful connections into my life",
                                "My unique perspective and skills bring value to everything I do",
                                "I am resilient and can overcome any obstacle with determination",
                                "Success flows to me naturally as I align my actions with my values",
                                "I am worthy of love, respect, and all the good things life offers",
                                "Today I choose courage over comfort and growth over stagnation"
                            ]
                        },
                        flashcard: {
                            name: "JavaScript Fundamentals",
                            category: "flashcard",
                            cards: [
                                "What is closure in JavaScript? A function that has access to variables in its outer scope",
                                "Explain event bubbling: Events propagate from target element up through the DOM tree",
                                "What is the difference between let and var? Let has block scope, var has function scope",
                                "What is a Promise? An object representing eventual completion of an asynchronous operation",
                                "Explain hoisting: Variable and function declarations are moved to the top of their scope",
                                "What is the Event Loop? Mechanism that handles asynchronous operations in JavaScript",
                                "What is prototypal inheritance? Objects can inherit properties from other objects",
                                "Explain async/await: Syntactic sugar for working with Promises more synchronously"
                            ]
                        }
                    };
                    this.saveToStorage('swipeDecks', this.decks);
                }
            }

            bindEvents() {
                let startX, startY, currentX, currentY;
                let isDragging = false;
                let currentCard = null;

                const cardContainer = document.getElementById('cardContainer');

                // Mouse events
                cardContainer.addEventListener('mousedown', (e) => this.startDrag(e, e.clientX, e.clientY));
                document.addEventListener('mousemove', (e) => this.duringDrag(e, e.clientX, e.clientY));
                document.addEventListener('mouseup', (e) => this.endDrag(e));

                // Touch events
                cardContainer.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    this.startDrag(e, touch.clientX, touch.clientY);
                });
                document.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.duringDrag(e, touch.clientX, touch.clientY);
                });
                document.addEventListener('touchend', (e) => this.endDrag(e));

                // Keyboard navigation
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.swipeCard('dislike');
                    if (e.key === 'ArrowRight') this.swipeCard('like');
                    if (e.key === 'Escape') {
                        this.closeModal('createModal');
                        this.closeModal('summaryModal');
                    }
                });

                // Form submission
                document.getElementById('createDeckForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.createCustomDeck();
                });
            }

            startDrag(e, x, y) {
                const card = e.target.closest('.card');
                if (!card) return;

                this.startX = x;
                this.startY = y;
                this.currentCard = card;
                this.isDragging = true;
                
                card.classList.add('dragging');
                e.preventDefault();
            }

            duringDrag(e, x, y) {
                if (!this.isDragging || !this.currentCard) return;

                this.currentX = x;
                this.currentY = y;

                const deltaX = this.currentX - this.startX;
                const deltaY = this.currentY - this.startY;
                const rotation = deltaX * 0.1;

                this.currentCard.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${rotation}deg)`;

                // Show swipe indicators
                const likeIndicator = this.currentCard.querySelector('.swipe-indicator.like');
                const dislikeIndicator = this.currentCard.querySelector('.swipe-indicator.dislike');

                if (deltaX > 50) {
                    likeIndicator.style.opacity = Math.min(1, (deltaX - 50) / 100);
                    dislikeIndicator.style.opacity = 0;
                } else if (deltaX < -50) {
                    dislikeIndicator.style.opacity = Math.min(1, (-deltaX - 50) / 100);
                    likeIndicator.style.opacity = 0;
                } else {
                    likeIndicator.style.opacity = 0;
                    dislikeIndicator.style.opacity = 0;
                }
            }

            endDrag(e) {
                if (!this.isDragging || !this.currentCard) return;

                const deltaX = this.currentX - this.startX;
                const threshold = 100;

                if (Math.abs(deltaX) > threshold) {
                    const direction = deltaX > 0 ? 'like' : 'dislike';
                    this.animateSwipe(this.currentCard, direction);
                } else {
                    // Snap back
                    this.currentCard.style.transform = '';
                    this.currentCard.classList.remove('dragging');
                    this.resetSwipeIndicators();
                }

                this.isDragging = false;
                this.currentCard = null;
            }

            swipeCard(direction) {
                const card = document.querySelector('.card:last-child');
                if (!card) return;

                this.animateSwipe(card, direction);
            }

            animateSwipe(card, direction) {
                const translateX = direction === 'like' ? 1000 : -1000;
                const rotation = direction === 'like' ? 30 : -30;

                card.style.transform = `translateX(${translateX}px) rotate(${rotation}deg)`;
                card.style.opacity = '0';

                // Record the swipe
                const cardData = {
                    content: card.querySelector('.card-content').textContent,
                    direction: direction,
                    timestamp: new Date().toISOString(),
                    deckName: this.currentDeck
                };

                this.swipeHistory.push(cardData);
                this.updateStatistics(direction);

                setTimeout(() => {
                    card.remove();
                    this.currentIndex++;
                    this.checkDeckCompletion();
                    this.updateUI();
                }, 300);
            }

            resetSwipeIndicators() {
                const indicators = document.querySelectorAll('.swipe-indicator');
                indicators.forEach(indicator => indicator.style.opacity = '0');
            }

            loadDeck(deckKey) {
                if (!this.decks[deckKey]) return;

                this.currentDeck = deckKey;
                this.currentCards = [...this.decks[deckKey].cards];
                this.currentIndex = 0;
                this.swipeHistory = [];

                this.renderCards();
                this.updateUI();
                this.updateDeckSelector();
            }

            renderCards() {
                const container = document.getElementById('cardContainer');
                container.innerHTML = '';

                // Render up to 3 cards (for stack effect)
                const cardsToShow = Math.min(3, this.currentCards.length - this.currentIndex);
                
                for (let i = cardsToShow - 1; i >= 0; i--) {
                    const cardIndex = this.currentIndex + i;
                    if (cardIndex >= this.currentCards.length) continue;

                    const card = this.createCardElement(this.currentCards[cardIndex], cardIndex + 1);
                    card.style.zIndex = cardsToShow - i;
                    card.style.transform = `scale(${1 - i * 0.05}) translateY(${i * 10}px)`;
                    
                    if (i === 0) {
                        card.classList.add('entering');
                    }
                    
                    container.appendChild(card);
                }
            }

            createCardElement(content, cardNumber) {
                const deck = this.decks[this.currentDeck];
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-category">${deck.category}</div>
                        <div class="card-title">${deck.name}</div>
                        <div class="card-number">${cardNumber}/${this.currentCards.length}</div>
                    </div>
                    <div class="card-content">${content}</div>
                    <div class="card-footer">
                        <div class="card-tags">
                            <span class="tag">${deck.category}</span>
                            <span class="tag">Swipe to decide</span>
                        </div>
                    </div>
                    <div class="swipe-indicator like">♥</div>
                    <div class="swipe-indicator dislike">✕</div>
                `;

                return card;
            }

            renderDeckSelector() {
                const selector = document.getElementById('deckSelector');
                selector.innerHTML = '';

                Object.keys(this.decks).forEach(key => {
                    const deck = this.decks[key];
                    const button = document.createElement('button');
                    button.className = 'deck-btn';
                    button.textContent = deck.name;
                    button.onclick = () => this.loadDeck(key);
                    selector.appendChild(button);
                });
            }

            updateDeckSelector() {
                const buttons = document.querySelectorAll('.deck-btn');
                buttons.forEach((btn, index) => {
                    const deckKey = Object.keys(this.decks)[index];
                    btn.classList.toggle('active', deckKey === this.currentDeck);
                });
            }

            updateUI() {
                const totalCards = this.currentCards.length;
                const remaining = totalCards - this.currentIndex;
                const progress = totalCards > 0 ? (this.currentIndex / totalCards) * 100 : 0;

                document.getElementById('totalCards').textContent = totalCards;
                document.getElementById('likedCount').textContent = this.statistics.totalLikes;
                document.getElementById('dislikedCount').textContent = this.statistics.totalDislikes;
                document.getElementById('accuracyRate').textContent = Math.round(progress) + '%';
                document.getElementById('progressFill').style.width = progress + '%';

                // Show next card if available
                if (remaining === 0) {
                    setTimeout(() => this.renderCards(), 500);
                }
            }

            updateStatistics(direction) {
                this.statistics.totalSwipes++;
                if (direction === 'like') {
                    this.statistics.totalLikes++;
                } else {
                    this.statistics.totalDislikes++;
                }

                const sessionKey = new Date().toDateString();
                if (!this.statistics.sessionData[sessionKey]) {
                    this.statistics.sessionData[sessionKey] = { likes: 0, dislikes: 0 };
                }
                this.statistics.sessionData[sessionKey][direction === 'like' ? 'likes' : 'dislikes']++;

                this.saveToStorage('swipeStats', this.statistics);
            }

            checkDeckCompletion() {
                if (this.currentIndex >= this.currentCards.length) {
                    setTimeout(() => {
                        alert(`🎉 Deck completed! You swiped through ${this.currentCards.length} cards.`);
                        this.showSummaryModal();
                    }, 500);
                }
            }

            createCustomDeck() {
                const name = document.getElementById('deckName').value.trim();
                const category = document.getElementById('deckCategory').value;
                const cardsText = document.getElementById('deckCards').value.trim();

                if (!name || !category || !cardsText) {
                    alert('Please fill in all fields');
                    return;
                }

                const cards = cardsText.split('\n').filter(card => card.trim().length > 0);
                if (cards.length === 0) {
                    alert('Please enter at least one card');
                    return;
                }

                const deckKey = name.toLowerCase().replace(/\s+/g, '_');
                this.decks[deckKey] = { name, category, cards };
                this.saveToStorage('swipeDecks', this.decks);

                this.renderDeckSelector();
                this.loadDeck(deckKey);
                this.closeModal('createModal');
                
                // Reset form
                document.getElementById('createDeckForm').reset();
                
                // Success notification
                this.showNotification('Deck created successfully!', 'success');
            }

            showSummaryModal() {
                const modal = document.getElementById('summaryModal');
                const content = document.getElementById('summaryContent');
                
                let summaryHTML = '<h3>Session Overview</h3>';
                
                if (this.swipeHistory.length === 0) {
                    summaryHTML += '<p>No swipes recorded yet. Start swiping to see your analytics!</p>';
                } else {
                    const liked = this.swipeHistory.filter(item => item.direction === 'like');
                    const disliked = this.swipeHistory.filter(item => item.direction === 'dislike');
                    
                    summaryHTML += `
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                            <div class="summary-item">
                                <span>Total Swipes</span>
                                <strong>${this.swipeHistory.length}</strong>
                            </div>
                            <div class="summary-item">
                                <span>Liked Items</span>
                                <strong>${liked.length}</strong>
                            </div>
                            <div class="summary-item">
                                <span>Disliked Items</span>
                                <strong>${disliked.length}</strong>
                            </div>
                            <div class="summary-item">
                                <span>Like Ratio</span>
                                <strong>${this.swipeHistory.length > 0 ? Math.round((liked.length / this.swipeHistory.length) * 100) : 0}%</strong>
                            </div>
                        </div>
                    `;

                    if (liked.length > 0) {
                        summaryHTML += '<h4 style="color: #4CAF50; margin-top: 30px;">✓ Items You Liked</h4>';
                        liked.forEach(item => {
                            summaryHTML += `
                                <div class="summary-item liked">
                                    <div>
                                        <strong>${item.content.substring(0, 60)}${item.content.length > 60 ? '...' : ''}</strong>
                                        <br><small>From: ${this.decks[item.deckName]?.name || item.deckName}</small>
                                    </div>
                                    <span style="color: #4CAF50;">♥</span>
                                </div>
                            `;
                        });
                    }

                    if (disliked.length > 0) {
                        summaryHTML += '<h4 style="color: #f44336; margin-top: 30px;">✕ Items You Disliked</h4>';
                        disliked.forEach(item => {
                            summaryHTML += `
                                <div class="summary-item disliked">
                                    <div>
                                        <strong>${item.content.substring(0, 60)}${item.content.length > 60 ? '...' : ''}</strong>
                                        <br><small>From: ${this.decks[item.deckName]?.name || item.deckName}</small>
                                    </div>
                                    <span style="color: #f44336;">✕</span>
                                </div>
                            `;
                        });
                    }

                    // Export functionality
                    summaryHTML += `
                        <div style="margin-top: 30px; text-align: center;">
                            <button class="btn btn-secondary" onclick="engine.exportData()">Export Data</button>
                            <button class="btn btn-primary" onclick="engine.shareResults()">Share Results</button>
                        </div>
                    `;
                }
                
                content.innerHTML = summaryHTML;
                modal.style.display = 'block';
            }

            exportData() {
                const exportData = {
                    timestamp: new Date().toISOString(),
                    statistics: this.statistics,
                    swipeHistory: this.swipeHistory,
                    currentDeck: this.currentDeck,
                    customDecks: this.decks
                };

                const dataStr = JSON.stringify(exportData, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = `swipeflow-data-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                this.showNotification('Data exported successfully!', 'success');
            }

            shareResults() {
                const liked = this.swipeHistory.filter(item => item.direction === 'like').length;
                const total = this.swipeHistory.length;
                const likeRatio = total > 0 ? Math.round((liked / total) * 100) : 0;
                
                const shareText = `I just used SwipeFlow to make decisions! 📱\n\n` +
                    `📊 My Results:\n` +
                    `• Total decisions: ${total}\n` +
                    `• Positive choices: ${liked}\n` +
                    `• Decision rate: ${likeRatio}%\n\n` +
                    `Try SwipeFlow for smarter decision making!`;

                if (navigator.share) {
                    navigator.share({
                        title: 'SwipeFlow Results',
                        text: shareText
                    });
                } else {
                    navigator.clipboard.writeText(shareText).then(() => {
                        this.showNotification('Results copied to clipboard!', 'success');
                    });
                }
            }

            resetDeck() {
                if (confirm('Are you sure you want to reset the current deck? This will clear your progress.')) {
                    this.currentIndex = 0;
                    this.swipeHistory = [];
                    this.renderCards();
                    this.updateUI();
                    this.showNotification('Deck reset successfully!', 'info');
                }
            }

            clearAllData() {
                if (confirm('Are you sure you want to clear ALL data? This action cannot be undone.')) {
                    // Keep default decks but clear custom ones and statistics
                    this.initializeDefaultDecks();
                    this.statistics = {
                        totalSwipes: 0,
                        totalLikes: 0,
                        totalDislikes: 0,
                        sessionData: {}
                    };
                    this.swipeHistory = [];
                    this.currentIndex = 0;
                    
                    this.saveToStorage('swipeDecks', this.decks);
                    this.saveToStorage('swipeStats', this.statistics);
                    
                    this.renderDeckSelector();
                    this.loadDeck('startup');
                    this.showNotification('All data cleared successfully!', 'info');
                }
            }

            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 25px;
                    border-radius: 10px;
                    color: white;
                    font-weight: 600;
                    z-index: 3000;
                    animation: slideIn 0.3s ease-out;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                `;

                const colors = {
                    success: 'linear-gradient(45deg, #4CAF50, #45a049)',
                    error: 'linear-gradient(45deg, #f44336, #d32f2f)',
                    info: 'linear-gradient(45deg, #2196F3, #1976D2)'
                };

                notification.style.background = colors[type] || colors.info;
                notification.textContent = message;

                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease-in forwards';
                    setTimeout(() => document.body.removeChild(notification), 300);
                }, 3000);
            }

            closeModal(modalId) {
                document.getElementById(modalId).style.display = 'none';
            }

            saveToStorage(key, data) {
                try {
                    window.swipeFlowData = window.swipeFlowData || {};
                    window.swipeFlowData[key] = data;
                } catch (error) {
                    console.warn('Storage unavailable, using memory only');
                }
            }

            loadFromStorage(key) {
                try {
                    return window.swipeFlowData?.[key] || null;
                } catch (error) {
                    console.warn('Storage unavailable, using defaults');
                    return null;
                }
            }
        }

        // Global functions for button clicks
        let engine;

        function showCreateModal() {
            document.getElementById('createModal').style.display = 'block';
        }

        function showSummaryModal() {
            engine.showSummaryModal();
        }

        function resetDeck() {
            engine.resetDeck();
        }

        function clearAllData() {
            engine.clearAllData();
        }

        function closeModal(modalId) {
            engine.closeModal(modalId);
        }

        function swipeCard(direction) {
            engine.swipeCard(direction);
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            engine = new SwipeCardEngine();
            
            // Add custom animations
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
                
                @keyframes slideOut {
                    from { transform: translateX(0); opacity: 1; }
                    to { transform: translateX(100%); opacity: 0; }
                }
                
                .card:hover {
                    transform: translateY(-5px) scale(1.02);
                    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
                }
                
                .btn:active {
                    transform: translateY(-1px) scale(0.98);
                }
                
                .deck-btn:active {
                    transform: scale(0.95);
                }
                
                .action-btn:active {
                    transform: scale(0.9);
                }
            `;
            document.head.appendChild(style);
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            // Adjust card container on mobile
            const container = document.getElementById('cardContainer');
            if (window.innerWidth <= 768) {
                container.style.transform = 'scale(0.9)';
            } else {
                container.style.transform = 'scale(1)';
            }
        });

        // Service Worker registration (for PWA capabilities)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Note: In a real implementation, you'd have a service worker file
                console.log('PWA capabilities available');
            });
        }
    </script>
</body>
</html>
